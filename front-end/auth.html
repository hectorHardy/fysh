<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fysh - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/nav.js" defer></script>
</head>
<body class="bg-slate-50">
    <nav id="main-nav" class="bg-blue-600 p-4 text-white flex justify-between items-center shadow-lg"></nav>

    <main class="container mx-auto mt-12 p-4 max-w-md">
        <div class="bg-white p-8 rounded-xl shadow-lg">
            <div class="flex border-b mb-6 text-center">
                <button id="tab-login" class="flex-1 pb-2 border-b-2 border-blue-600 font-bold">Login</button>
                <button id="tab-signup" class="flex-1 pb-2 border-gray-200 text-gray-400">Sign Up</button>
            </div>

            <form id="auth-form">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-bold mb-2">Email</label>
                    <input type="email" id="email" class="w-full p-2 border rounded" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="block text-sm font-bold mb-2">Password</label>
                    <input type="password" id="password" class="w-full p-2 border rounded" required>
                </div>
                <div id="code-group" class="mb-4 hidden">
                    <label for="verify-code" class="block text-sm font-bold mb-2 text-blue-600">Verification Code</label>
                    <input type="text" id="verify-code" class="w-full p-2 border-2 border-blue-600 rounded">
                </div>
                <button type="submit" id="auth-submit-btn" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">
                    Login
                </button>
            </form>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
